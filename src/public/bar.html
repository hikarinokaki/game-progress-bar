<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Progress Bar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap"
    />
    <style>
      :root {
        --font-body: Arial, sans-serif;
        --bar-title-color: #ffffff;
        --bar-text-color: #ffffff;
        --bar-shadow:
          -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000,
          0 4px 8px rgba(0, 0, 0, 0.3);
        --bar-track-bg: #ddd;
        --bar-fill-bg: #4caf50;
        --bar-bg-body: transparent;
      }

      [data-theme="medieval"] {
        --font-body: "Cinzel", serif;
        --bar-title-color: #d4bf8a;
        --bar-text-color: #d4bf8a;
        --bar-shadow:
          -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000,
          0 4px 12px rgba(0, 0, 0, 0.6);
        --bar-track-bg: #2a1f14;
        --bar-fill-bg: #c4a96a;
        --bar-bg-body: transparent;
      }

      body {
        margin: 0;
        overflow: hidden;
        font-family: var(--font-body);
        background: var(--bar-bg-body);
        width: 100vw;
        height: 100vh;
      }

      #bar-stage {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      #bar-canvas {
        position: relative;
        transform-origin: center center;
        flex-shrink: 0;
        overflow: visible;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      #bar-canvas h1 {
        text-align: center;
        color: var(--bar-title-color);
        text-shadow: var(--bar-shadow);
        margin: 0;
        user-select: none;
        position: relative;
        z-index: 1;
      }

      #percentage {
        text-align: center;
        font-weight: bold;
        margin-top: 0;
        color: var(--bar-text-color);
        text-shadow: var(--bar-shadow);
        user-select: none;
        position: relative;
        z-index: 1;
      }

      #progressContainer {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 0;
        overflow: visible;
      }

      .progress-bar-html {
        width: 100%;
        height: 60px;
      }

      progress::-webkit-progress-value {
        background-color: var(--bar-fill-bg);
        transition: background-color 0.3s;
      }
      progress::-moz-progress-bar {
        background-color: var(--bar-fill-bg);
        transition: background-color 0.3s;
      }
      progress::-webkit-progress-bar {
        background-color: var(--bar-track-bg);
      }
      progress {
        background-color: var(--bar-track-bg);
      }

      .progress-bar-gradient {
        width: 100%;
        height: 60px;
        background: linear-gradient(var(--bar-fill-bg) 0 0) 0/0% no-repeat
          var(--bar-track-bg);
        border-radius: 5px;
        transition: background-size 0.3s ease;
      }

      .progress-bar-steps {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        -webkit-mask: linear-gradient(0deg, #000 55%, #0000 0) bottom/100%
          18.18%;
        mask: linear-gradient(0deg, #000 55%, #0000 0) bottom/100% 18.18%;
        background: linear-gradient(var(--bar-fill-bg) 0 0) bottom/100% 0%
          no-repeat var(--bar-track-bg);
      }

      .progress-bar-mask {
        position: relative;
        overflow: hidden;
      }

      .milestone-marker {
        position: absolute;
        left: 0;
        top: 0;
        pointer-events: none;
        z-index: 5;
      }

      .milestone-marker-line {
        position: absolute;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 1px;
      }

      .milestone-marker-label {
        position: absolute;
        color: var(--bar-text-color);
        text-shadow: var(--bar-shadow);
        font-size: 14px;
        white-space: nowrap;
        pointer-events: none;
      }

      .selected {
        box-shadow: 0 0 0 3px #4fc3f7;
        background: rgba(79, 195, 247, 0.08);
      }

      .resize-handle {
        position: absolute;
        width: 14px;
        height: 14px;
        background: #4fc3f7;
        border: 1px solid #fff;
        pointer-events: auto;
        z-index: 10;
      }

      #box-select-rect {
        position: absolute;
        border: 1px dashed #4fc3f7;
        background: rgba(79, 195, 247, 0.08);
        pointer-events: none;
        z-index: 100;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="bar-stage">
      <div id="bar-canvas">
        <h1 id="title"></h1>
        <div id="progressContainer"></div>
        <p id="percentage"></p>
        <svg
          id="snap-guides"
          style="
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: visible;
          "
          width="100%"
          height="100%"
        ></svg>
        <div id="box-select-rect"></div>
      </div>
    </div>

    <script src="dist/bar.bundle.js"></script>
  </body>
</html>
