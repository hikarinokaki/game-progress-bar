<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Progress Bar With Live URL Updates</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 40px;
        max-width: 80%;
        margin: 0 auto;
      }

      h1 {
        text-align: center;
        color: white;
        text-shadow:
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000,
          0 4px 8px rgba(0, 0, 0, 0.3);
        font-size: 2.5em;
        /* margin: 20px 0; */
        margin: 0px;
      }

      #percentage {
        text-align: center;
        font-size: 2rem;
        font-weight: bold;
        margin-top: 0;
        color: white;
        text-shadow:
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000,
          0 4px 8px rgba(0, 0, 0, 0.3);
      }

      /* Container for all progress bar types */
      #progressContainer {
        /* margin: 20px 0; */
        min-height: 30vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Style: HTML Progress Bar */
      .progress-bar-html {
        width: 100%;
        height: 60px;
      }

      /* Dynamic color styling for HTML progress element */
      /* These will be overridden by JavaScript with actual accent color */
      progress::-webkit-progress-value {
        background-color: #4caf50;
        transition: background-color 0.3s;
      }

      progress::-moz-progress-bar {
        background-color: #4caf50;
        transition: background-color 0.3s;
      }

      progress::-webkit-progress-bar {
        background-color: #ddd;
      }

      progress {
        background-color: #ddd;
      }

      /* Style: CSS Gradient Animation */
      .progress-bar-gradient {
        width: 100%;
        height: 60px;
        background: linear-gradient(#4caf50 0 0) 0/0% no-repeat #ddd;
        border-radius: 5px;
        transition: background-size 0.3s ease;
      }

      /* Style: Step-wise Circle */
      .progress-bar-steps {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        -webkit-mask: linear-gradient(0deg, #000 55%, #0000 0) bottom/100%
          18.18%;
        mask: linear-gradient(0deg, #000 55%, #0000 0) bottom/100% 18.18%;
        background: linear-gradient(#4caf50 0 0) bottom/100% 0% no-repeat #ddd;
      }
    </style>
  </head>
  <body>
    <h1 id="title"></h1>
    <div id="progressContainer"></div>
    <p id="percentage"></p>

    <script>
      /* ============================================
           HELPER FUNCTIONS
        ============================================ */

      function secondsToNaturalTime(seconds) {
        const minutes = Math.floor(seconds / 60);
        const hours = Math.floor(minutes / 60);
        const remainingMinutes = minutes % 60;
        const remainingSeconds = seconds % 60;

        if (hours > 0 && remainingMinutes > 0) {
          return `${hours}h ${remainingMinutes}m`;
        }
        if (hours > 0) {
          return `${hours}h`;
        }
        if (remainingMinutes > 0) {
          return `${remainingMinutes}m`;
        }
        return `${remainingSeconds}s`;
      }

      /* ============================================
           PROGRESS BAR STYLE REGISTRY
        ============================================ */

      const ProgressStyles = {
        // Style: HTML Progress Element
        progress: {
          init(container) {
            const progress = document.createElement("progress");
            progress.className = "progress-bar-html";
            container.appendChild(progress);

            // Apply accent color via CSS
            const styleEl = document.createElement("style");
            styleEl.id = "progress-color-style";
            styleEl.textContent = `
                        progress::-webkit-progress-value {
                            background-color: ${accentColor};
                        }
                        progress::-moz-progress-bar {
                            background-color: ${accentColor};
                        }
                    `;
            document.head.appendChild(styleEl);

            return progress;
          },

          update(element, value, max) {
            element.max = max;
            element.value = value;
          },

          getElement(container) {
            return container.querySelector("progress");
          },
        },

        // Style: CSS Gradient Animation
        gradient: {
          init(container) {
            const div = document.createElement("div");
            div.className = "progress-bar-gradient";
            div.style.background = `linear-gradient(${accentColor} 0 0) 0/0% no-repeat #ddd`;
            container.appendChild(div);
            return div;
          },

          update(element, value, max) {
            const percent = max > 0 ? (value / max) * 100 : 0;
            element.style.backgroundSize = `${percent}% 100%`;
          },

          getElement(container) {
            return container.querySelector(".progress-bar-gradient");
          },
        },

        // Style: Step-wise Circle
        steps: {
          init(container) {
            const div = document.createElement("div");
            div.className = "progress-bar-steps";
            div.style.background = `linear-gradient(${accentColor} 0 0) bottom/100% 0% no-repeat #ddd`;
            container.appendChild(div);
            return div;
          },

          update(element, value, max) {
            const percent = max > 0 ? (value / max) * 100 : 0;
            // Calculate background size with step effect (115% for full fill)
            const bgSize = (percent / 100) * 115;
            element.style.backgroundSize = `100% ${bgSize}%`;
          },

          getElement(container) {
            return container.querySelector(".progress-bar-steps");
          },
        },

        // Add more styles here in the future...
      };

      /* ============================================
           INITIALIZATION
        ============================================ */

      const params = new URLSearchParams(window.location.search);

      let start = parseInt(params.get("start"));
      let max = parseInt(params.get("max"));
      let title = params.get("title") || "";
      let style = params.get("style") || "progress";
      let displayFormat = params.get("displayFormat") || "percentage";
      let accentColor = params.get("accentColor") || "#4CAF50";

      // Validate parameters
      if (isNaN(start) || start < 0) start = 0;
      if (isNaN(max) || max <= 0) max = 100;
      if (start > max) start = max;

      // Validate style
      if (!ProgressStyles[style]) {
        console.warn(`Unknown style "${style}", falling back to "progress"`);
        style = "progress";
      }

      // Validate displayFormat
      const validFormats = ["percentage", "time", "none"];
      if (!validFormats.includes(displayFormat)) {
        console.warn(
          `Unknown displayFormat "${displayFormat}", falling back to "percentage"`,
        );
        displayFormat = "percentage";
      }

      // Validate accentColor (basic hex color validation)
      if (!/^#[0-9A-Fa-f]{6}$/.test(accentColor)) {
        console.warn(
          `Invalid accentColor "${accentColor}", falling back to "#4CAF50"`,
        );
        accentColor = "#4CAF50";
      }

      // Get elements
      const container = document.getElementById("progressContainer");
      const percentageText = document.getElementById("percentage");
      const titleElement = document.getElementById("title");

      // Set title and show/hide based on whether it's empty
      if (title) {
        titleElement.textContent = title;
        titleElement.style.display = "block";
      } else {
        titleElement.style.display = "none";
      }

      // Initialize the selected style
      const styleRenderer = ProgressStyles[style];
      const progressElement = styleRenderer.init(container);

      /* ============================================
           UPDATE FUNCTIONS
        ============================================ */

      function updateProgress(value, maxValue) {
        styleRenderer.update(progressElement, value, maxValue);
      }

      function updateDisplay(value, maxValue) {
        if (displayFormat === "percentage") {
          const percent = Math.round((value / maxValue) * 100);
          percentageText.textContent = percent + "%";
          percentageText.style.display = "block";
        } else if (displayFormat === "time") {
          const remaining = maxValue - value;
          percentageText.textContent = `${secondsToNaturalTime(value)} / ${secondsToNaturalTime(maxValue)}`;
          percentageText.style.display = "block";
        } else if (displayFormat === "none") {
          percentageText.style.display = "none";
        }
      }

      function updateURL(value, maxValue) {
        const newParams = new URLSearchParams();
        newParams.set("start", value);
        newParams.set("max", maxValue);
        newParams.set("title", title);
        newParams.set("style", style);
        newParams.set("displayFormat", displayFormat);
        newParams.set("accentColor", accentColor);
        const newUrl = window.location.pathname + "?" + newParams.toString();
        history.replaceState(null, "", newUrl);
      }

      // Initial render
      updateProgress(start, max);
      updateDisplay(start, max);
      updateURL(start, max);

      /* ============================================
           ANIMATION LOOP
        ============================================ */

      let currentValue = start;
      const interval = setInterval(() => {
        if (currentValue < max) {
          currentValue++;
          updateProgress(currentValue, max);
          updateDisplay(currentValue, max);
          updateURL(currentValue, max);
        } else {
          clearInterval(interval);
        }
      }, 1000);
    </script>
  </body>
</html>
