<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Progress Bar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap"
    />
    <style>
      :root {
        --font-body: Arial, sans-serif;
        --bar-title-color: #ffffff;
        --bar-text-color: #ffffff;
        --bar-shadow:
          -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000,
          0 4px 8px rgba(0, 0, 0, 0.3);
        --bar-track-bg: #ddd;
        --bar-fill-bg: #4caf50;
        --bar-bg-body: transparent;
      }

      [data-theme="medieval"] {
        --font-body: "Cinzel", serif;
        --bar-title-color: #d4bf8a;
        --bar-text-color: #d4bf8a;
        --bar-shadow:
          -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000,
          0 4px 12px rgba(0, 0, 0, 0.6);
        --bar-track-bg: #2a1f14;
        --bar-fill-bg: #c4a96a;
        --bar-bg-body: transparent;
      }

      body {
        font-family: var(--font-body);
        padding: 40px;
        max-width: 80%;
        margin: 0 auto;
        background: var(--bar-bg-body);
      }

      h1 {
        text-align: center;
        color: var(--bar-title-color);
        text-shadow: var(--bar-shadow);
        font-size: 2.5em;
        margin: 0;
      }

      #percentage {
        text-align: center;
        font-size: 2rem;
        font-weight: bold;
        margin-top: 0;
        color: var(--bar-text-color);
        text-shadow: var(--bar-shadow);
      }

      #progressContainer {
        min-height: 30vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .progress-bar-html {
        width: 100%;
        height: 60px;
      }

      progress::-webkit-progress-value {
        background-color: var(--bar-fill-bg);
        transition: background-color 0.3s;
      }
      progress::-moz-progress-bar {
        background-color: var(--bar-fill-bg);
        transition: background-color 0.3s;
      }
      progress::-webkit-progress-bar {
        background-color: var(--bar-track-bg);
      }
      progress {
        background-color: var(--bar-track-bg);
      }

      .progress-bar-gradient {
        width: 100%;
        height: 60px;
        background: linear-gradient(var(--bar-fill-bg) 0 0) 0/0% no-repeat
          var(--bar-track-bg);
        border-radius: 5px;
        transition: background-size 0.3s ease;
      }

      .progress-bar-steps {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        -webkit-mask: linear-gradient(0deg, #000 55%, #0000 0) bottom/100%
          18.18%;
        mask: linear-gradient(0deg, #000 55%, #0000 0) bottom/100% 18.18%;
        background: linear-gradient(var(--bar-fill-bg) 0 0) bottom/100% 0%
          no-repeat var(--bar-track-bg);
      }

      .progress-bar-mask {
        position: relative;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <h1 id="title"></h1>
    <div id="progressContainer"></div>
    <p id="percentage"></p>

    <script src="dist/bar.bundle.js"></script>
  </body>
</html>
